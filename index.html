<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>目標:考研!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        section {
        scroll-margin-top: 40px;
    }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 緊急程度顏色 */
        .priority-high { border-left: 10px solid #ff4d4d; }
        .priority-medium { border-left: 10px solid #ffcc00; }
        .priority-low { border-left: 10px solid #45f045; }
        
        .progress-bar { width: 100%; background: #444; height: 10px; border-radius: 5px; }
        .progress-fill { height: 100%; background: #007bff; border-radius: 5px; }
    </style>
</head>
<body>
    <nav class="sticky top-0 bg-white/90 backdrop-blur-sm shadow-sm z-50 overflow-hidden border-b border-slate-200">
        <div class="flex py-3 px-4 gap-2 overflow-x-auto no-scrollbar scroll-smooth">
            <a href="#Tim" class="px-5 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold shadow-md shadow-blue-200 transition-all shrink-0">曜0</a> 
            <a href="#Dexter" class="px-5 py-2 bg-white text-slate-600 rounded-xl text-xs font-bold border border-slate-200 transition-all shrink-0">德</a>
        </div>
    </nav>
    <main class="p-4 max-w-md mx-auto">
        <div id="task-container">
            </div>
    </main>
    <div class="max-w-md mx-auto px-6 mt-8">
        <header class="mb-10">
            <h1 class="text-3xl font-black text-slate-800">倒數 ✈️</h1>
            <p class="text-slate-400 font-medium">天</p>
        </header>
    </div>
    <button id="fab" onclick="toggleModal()">+</button>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h3>✨ 新增進度任務</h3>
            <input type="text" id="taskTitle" placeholder="任務名稱 (如：碩考複習)">
            
            <div class="form-group">
                <label>執行者：</label>
                <select id="taskUser">
                    <option value="曜廷">曜廷</option>
                    <option value="同學">同學</option>
                </select>
            </div>
    
            <div class="form-group">
                <label>緊急程度：</label>
                <select id="taskPriority">
                    <option value="high">🔴 高 (High)</option>
                    <option value="medium">🟡 中 (Medium)</option>
                    <option value="low">🟢 低 (Low)</option>
                </select>
            </div>
    
            <div class="form-group">
                <label>開始日期：</label>
                <input type="date" id="startDate">
            </div>
    
            <div class="modal-buttons">
                <button onclick="toggleModal()" style="background:#666;">取消</button>
                <button onclick="handleSave()" style="background:#007bff;">儲存任務</button>
            </div>
        </div>
    </div>

    <style>
        /* 右下角加號按鈕 */
        #fab {
            position: fixed;
            right: 30px;
            bottom: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #007bff;
            color: white;
            font-size: 30px;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 999;
            transition: transform 0.2s;
        }
        #fab:hover { transform: scale(1.1); }
        
        /* 彈出視窗背景 */
        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
        }
        
        /* 視窗主體 */
        .modal-content {
            background: #2a2a2a;
            width: 90%;
            max-width: 400px;
            margin: 15% auto;
            padding: 25px;
            border-radius: 15px;
            color: white;
            font-family: sans-serif;
        }
        
        .form-group { margin: 15px 0; }
        .form-group label { display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; background: #333; color: white; border: 1px solid #555; border-radius: 5px; box-sizing: border-box; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; }
    </style>
    <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  // 這裡貼上你在 Firebase 畫面看到的內容
  const firebaseConfig = {
    apiKey: "AIzaSyBO8HrPtilOHKyPoK8rQn6kPGRYQ5P1cf8",
    authDomain: "test-2026-76f04.firebaseapp.com",
    databaseURL: "https://test-2026-76f04-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "test-2026-76f04",
    storageBucket: "test-2026-76f04.firebasestorage.app",
    messagingSenderId: "323564170341",
    appId: "1:323564170341:web:a0d62f9a8bef5e532faa8c",
    measurementId: "G-CX05C0XH7F"
  };

  // 初始化 Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'tasks');

  // --- 接下來是邏輯部分 ---
    window.toggleModal = function() {
        const modal = document.getElementById('taskModal');
        modal.style.display = (modal.style.display === 'block') ? 'none' : 'block';
        document.getElementById('startDate').valueAsDate = new Date();
    };
    
    window.handleSave = function() {
        window.addNewTask(); // 確保你腳本裡有定義這個新增到 Firebase 的函數
        window.toggleModal(); 
            };
  // 1. 新增任務到雲端
  window.addNewTask = function() {
      const title = document.getElementById('taskTitle').value;
      const priority = document.getElementById('taskPriority').value;
      const start = document.getElementById('startDate').value;
      const user = document.getElementById('taskUser').value;

      if (!title) return alert("請輸入任務！");

      push(dbRef, {
          user: user,
          title: title,
          priority: priority,
          start: start,
          progress: 0,
          timestamp: Date.now()
      });
      
      document.getElementById('taskTitle').value = ""; // 清空輸入框
  };

    // 1. 監聽雲端資料：只要資料一變動，這裡就會自動執行
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('task-container');
        
        // 重要：先清空舊的內容，不然會重複出現
        container.innerHTML = ""; 
    
        if (data) {
            // 將 Firebase 的物件轉換成陣列並跑迴圈
            Object.keys(data).forEach(key => {
                const task = data[key];
                const days = calculateDays(task.start);
                
                // 呼叫渲染函式
                renderCard(container, task, days);
            });
        } else {
            container.innerHTML = "<p style='color:gray;'>目前沒有任務，點擊右下角加號新增吧！</p>";
        }
    });
    
    // 2. 渲染卡片的輔助函式 (確保這裡的 HTML 結構是你想要的)
    function renderCard(container, task, days) {
    // 根據緊急程度決定標題顏色
    const titleColor = task.priority === 'high' ? 'text-rose-700' : 
                      task.priority === 'medium' ? 'text-amber-600' : 'text-emerald-600';

    const cardHtml = `
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 mb-4 overflow-hidden transition-all hover:shadow-md">
            <div class="px-5 py-3 flex justify-between items-center bg-slate-50/50">
                <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Task Tracker</span>
                <span class="px-2 py-1 bg-white text-slate-500 rounded-md text-[10px] font-bold border border-slate-200 shadow-sm">
                    👤 ${task.user}
                </span>
            </div>

            <div class="px-5 pb-5 text-sm text-slate-600 border-t border-slate-50">
                <h4 class="font-bold ${titleColor} mb-2 pt-3 flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-current"></span>
                    ${task.priority.toUpperCase()} PRIORITY
                </h4>
                
                <h3 class="text-base font-bold text-slate-800 mb-3 pl-3 border-l-2 border-slate-200">
                    ${task.title}
                </h3>

                <div class="flex items-center justify-between mb-2 px-1">
                    <span class="text-xs font-medium text-slate-500">🔥 已衝刺 ${days} 天</span>
                    <span class="text-xs font-bold text-blue-600">${task.progress || 0}%</span>
                </div>

                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div class="bg-blue-500 h-full rounded-full transition-all duration-500" 
                         style="width: ${task.progress || 0}%">
                    </div>
                </div>
            </div>
        </div>
    `;
    container.insertAdjacentHTML('beforeend', cardHtml);
    }
    
    // 3. 輔助工具：根據緊急程度給顏色
    function getPriorityColor(p) {
        if (p === 'high') return '#ff4d4d';
        if (p === 'medium') return '#ffcc00';
        return '#45f045';
    }
    
    // 4. 計算天數 (確保沒壞掉)
    function calculateDays(startDate) {
        const start = new Date(startDate);
        const today = new Date();
        const diffTime = Math.abs(today - start);
        return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    }
</script>
</body>
</html>
