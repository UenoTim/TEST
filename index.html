<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        section {
        scroll-margin-top: 40px;
    }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 緊急程度顏色 */
        .priority-high { border-left: 10px solid #ff4d4d; }
        .priority-medium { border-left: 10px solid #ffcc00; }
        .priority-low { border-left: 10px solid #45f045; }
        
        .progress-bar { width: 100%; background: #444; height: 10px; border-radius: 5px; }
        .progress-fill { height: 100%; background: #007bff; border-radius: 5px; }
    </style>
</head>
<body>
    <nav class="sticky top-0 bg-white/90 backdrop-blur-sm shadow-sm z-50 overflow-hidden border-b border-slate-200">
        <div class="flex py-3 px-4 gap-2 overflow-x-auto no-scrollbar scroll-smooth">
            <h1 class="px-5 py-2 bg-rose-300 text-slate-600 rounded-xl text-m font-black border border-slate-200 transition-all shrink-0">考研倒數 <span class="countdown-tag text-rose-600" data-date="2027-01-31T00:00:00"></span> ✈️</h1>
            <h1 class="px-5 py-2 bg-amber-300 text-slate-600 rounded-xl text-m font-black border border-slate-200 transition-all shrink-0">114-2倒數 <span class="countdown-tag text-amber-600" data-date="2026-06-26T00:00:00"></span> ✈️</h1>
        </div>
    </nav>
    <main class="p-4 max-w-md mx-auto">
        <div id="task-container">
            </div>
    </main>
    <button id="fab" onclick="toggleModal()">+</button>

    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">✨ 新增進度任務</h3>
            <input type="hidden" id="editTaskId"> 
            
            <input type="text" id="taskTitle" placeholder="任務名稱">
            
            <div class="form-group">
                <label>執行者：</label>
                <select id="taskUser">
                    <option value="曜廷">曜廷</option>
                    <option value="德昇">德昇</option>
                </select>
            </div>
    
            <div class="form-group">
                <label>緊急程度：</label>
                <select id="taskPriority">
                    <option value="high">🔴 高 (High)</option>
                    <option value="medium">🟡 中 (Medium)</option>
                    <option value="low">🟢 低 (Low)</option>
                </select>
            </div>
            <div class="form-group" id="progressGroup" style="display:none; background: #3d3d3d; padding: 10px; border-radius: 8px;">
                <label class="text-amber-400 font-bold mb-2 block">📺 課程進度追蹤</label>
                <div class="flex gap-3 items-center">
                    <div>
                        <label class="text-xs text-slate-400">已看</label>
                        <input type="number" id="watchedCount" class="w-20" min="0" value="0">
                    </div>
                    <div class="text-xl mt-5">/</div>
                    <div>
                        <label class="text-xs text-slate-400">總集數</label>
                        <input type="number" id="totalCount" class="w-20" min="1" value="100">
                    </div>
                    <div class="ml-auto text-right">
                        <label class="text-xs text-slate-400">自動換算</label>
                        <div class="text-blue-400 font-black text-lg"><span id="autoPercent">0</span>%</div>
                    </div>
                </div>
                <input type="hidden" id="taskProgress">
            </div>
            <div class="form-group">
                <label>開始日期：</label>
                <input type="date" id="startDate">
            </div>
    
            <div class="modal-buttons">
                <button onclick="window.toggleModal()" style="background:#666;">取消</button>
                <button id="saveBtn" onclick="window.handleSave()" style="background:#007bff;">儲存任務</button>
            </div>
        </div>
    </div>

    <style>
        /* 右下角加號按鈕 */
        #fab {
            position: fixed;
            right: 30px;
            bottom: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: #007bff;
            color: white;
            font-size: 30px;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            z-index: 999;
            transition: transform 0.2s;
        }
        #fab:hover { transform: scale(1.1); }
        
        /* 彈出視窗背景 */
        .modal {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
        }
        
        /* 視窗主體 */
        .modal-content {
            background: #2a2a2a;
            width: 90%;
            max-width: 400px;
            margin: 15% auto;
            padding: 25px;
            border-radius: 15px;
            color: white;
            font-family: sans-serif;
        }
        
        .form-group { margin: 15px 0; }
        .form-group label { display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; background: #333; color: white; border: 1px solid #555; border-radius: 5px; box-sizing: border-box; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; }
    </style>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    
      // 這裡貼上你在 Firebase 畫面看到的內容
      const firebaseConfig = {
        apiKey: "AIzaSyBO8HrPtilOHKyPoK8rQn6kPGRYQ5P1cf8",
        authDomain: "test-2026-76f04.firebaseapp.com",
        databaseURL: "https://test-2026-76f04-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "test-2026-76f04",
        storageBucket: "test-2026-76f04.firebasestorage.app",
        messagingSenderId: "323564170341",
        appId: "1:323564170341:web:a0d62f9a8bef5e532faa8c",
        measurementId: "G-CX05C0XH7F"
      };

  // 初始化 Firebase
  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'tasks');

    // 修正：確保全域都能抓到 toggleModal
    window.toggleModal = function() {
        const modal = document.getElementById('taskModal');
        // 如果目前是隱藏的，就打開它
        if (modal.style.display === 'none' || modal.style.display === '') {
            window.openModal(); // 這會觸發重設為「新增模式」
        } else {
            modal.style.display = 'none';
        }
    };

// 開啟視窗：如果是編輯模式，會帶入資料
    window.openModal = function(id = null, taskData = null) {
        const modal = document.getElementById('taskModal');
        const modalTitle = document.getElementById('modalTitle');
        const progressGroup = document.getElementById('progressGroup');
        
        if (id) {
            // --- 編輯模式 ---
            modalTitle.innerText = "✏️ 編輯任務";
            document.getElementById('editTaskId').value = id;
            document.getElementById('taskTitle').value = taskData.title;
            document.getElementById('taskUser').value = taskData.user;
            document.getElementById('taskPriority').value = taskData.priority;
            document.getElementById('startDate').value = taskData.start;

            // 關鍵判斷：只有置頂任務 (isPinned) 才顯示進度調整
            if (taskData.isPinned) {
                progressGroup.style.display = "block";
                document.getElementById('watchedCount').value = taskData.watched || 0;
                document.getElementById('totalCount').value = taskData.total || 1;
                document.getElementById('taskProgress').value = taskData.progress || 0;
            } else {
                progressGroup.style.display = "none";
            }
        } else {
            // --- 新增模式 ---
            modalTitle.innerText = "✨ 新增一般任務";
            progressGroup.style.display = "none"; // 新增時預設隱藏趴數
            document.getElementById('editTaskId').value = "";
            document.getElementById('taskTitle').value = "";
            document.getElementById('startDate').valueAsDate = new Date();
            document.getElementById('taskProgress').value = 0;
        }
        modal.style.display = 'block';
    };

// 統一儲存入口
    window.handleSave = function() {
        const id = document.getElementById('editTaskId').value;
        const isPinned = document.getElementById('progressGroup').style.display === "block";
        
        // 1. 抓取基本欄位
        const taskData = {
            title: document.getElementById('taskTitle').value,
            user: document.getElementById('taskUser').value,
            priority: document.getElementById('taskPriority').value,
            start: document.getElementById('startDate').value,
            timestamp: Date.now()
        };

        // 2. 如果是置頂任務，處理集數與計算趴數
        if (isPinned) {
            const watched = parseInt(document.getElementById('watchedCount').value) || 0;
            const total = parseInt(document.getElementById('totalCount').value) || 1;
            // 計算趴數 (四捨五入)
            const percent = Math.round((watched / total) * 100);

            taskData.isPinned = true;
            taskData.watched = watched;
            taskData.total = total;
            taskData.progress = percent > 100 ? 100 : percent; // 存入計算後的趴數
        } else {
            taskData.progress = 0; // 一般任務不計趴數
            // 如果原本是置頂任務被改回一般任務，可以把 isPinned 設為 false
            taskData.isPinned = false; 
        }

        // 3. 儲存到 Firebase
        if (id) {
            update(ref(db, `tasks/${id}`), taskData);
        } else {
            push(dbRef, taskData);
        }
        window.toggleModal();
    };

  // 1. 新增任務到雲端
  window.addNewTask = function() {
      const title = document.getElementById('taskTitle').value;
      const priority = document.getElementById('taskPriority').value;
      const start = document.getElementById('startDate').value;
      const user = document.getElementById('taskUser').value;

      if (!title) return alert("請輸入任務！");

      push(dbRef, {
          user: user,
          title: title,
          priority: priority,
          start: start,
          progress: 0,
          timestamp: Date.now()
      });
      
      document.getElementById('taskTitle').value = ""; // 清空輸入框
  };
// 刪除功能
    window.deleteTask = function(id) {
        if (confirm("確定要刪除這個任務嗎？")) {
            remove(ref(db, `tasks/${id}`));
        }
    };

    // 1. 監聽雲端資料：只要資料一變動，這裡就會自動執行
    onValue(dbRef, (snapshot) => {
    const data = snapshot.val();
    const container = document.getElementById('task-container');
    container.innerHTML = ""; 

    if (data) {
        const allTasks = Object.keys(data).map(key => ({ id: key, ...data[key] }));

        // 1. 找出置頂任務 (你跟德昇的總進度)
        // 假設這兩個任務的標題包含 "總進度" 關鍵字，或者你可以根據 user 判斷
        const pinnedTasks = allTasks.filter(t => t.isPinned === true);
        const normalTasks = allTasks.filter(t => !t.isPinned);

        // 2. 先渲染置頂任務 (強制顯示進度條)
        pinnedTasks.forEach(task => {
            renderCard(container, task, calculateDays(task.start), task.id, true);
        });

        // 3. 再渲染一般任務 (隱藏進度條)
        normalTasks.forEach(task => {
            renderCard(container, task, calculateDays(task.start), task.id, false);
        });
    }
});

    // --- 4. 碩考倒數計時器 ---
    function updateAllCountdowns() {
    // 找出頁面上所有帶有這個 class 的標籤
    const tags = document.querySelectorAll('.countdown-tag');

    tags.forEach(tag => {
        const endDateStr = tag.getAttribute('data-date');
        if (!endDateStr) return;

        const endDate = new Date(endDateStr).getTime();
        const now = new Date().getTime();
        const distance = endDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));

        if (days > 0) {
            tag.innerText = days + " 天";
        } else if (days === 0) {
            tag.innerText = "就是今天！";
        } else {
            tag.innerText = "已結束";
        }
    });
}

// 執行
    updateAllCountdowns();

        
    // 2. 渲染卡片的輔助函式 (確保這裡的 HTML 結構是你想要的)
    function renderCard(container, task, days, id, showProgress) {
        const titleColor = task.priority === 'high' ? 'bg-rose-400' : 
                        task.priority === 'medium' ? 'bg-amber-400' : 'bg-emerald-400';

        // 判斷：如果是置頂任務，隱藏刪除按鈕
        const deleteBtnHtml = showProgress ? '' : `<button id="del-${id}" class="bg-white rounded-md text-slate-400 hover:text-rose-500 text-xs p-1">🗑️</button>`;

        const plusOneBtn = showProgress ? `
            <button id="plus-${id}" class="ml-2 bg-white text-blue-700 font-bold px-4 rounded-md active:scale-95 transition-all text-sm">
                ＋1 集
            </button>
        ` : '';

        // 判斷：進度條 HTML
        const progressHtml = showProgress ? `
            <div class="flex items-center justify-between mb-2 px-1">
                <span class="text-[14px] font-bold text-slate-500">🔥 考研衝刺 ${days} 天</span>
                <span class="text-xs font-bold text-blue-600">${task.progress || 0}%：${task.watched || 0} / ${task.total || 0} 集</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                    <div class="bg-blue-500 h-full rounded-full transition-all duration-500" style="width: ${task.progress || 0}%"></div>
                </div>
            </div>
        ` : `<span class="text-[14px] font-bold text-slate-500">🔥 已經衝刺 ${days} 天</span>`;

        const cardHtml = `
            <div class="bg-white rounded-2xl shadow-sm border ${showProgress ? 'border-blue-400 border-2' : 'border-slate-300'} mb-4 overflow-hidden relative">
                <div class="absolute top-3 right-3 flex gap-2 z-10">
                    <button id="edit-${id}" class="bg-white rounded-md text-slate-400 hover:text-blue-500 text-sm px-4 p-1">✏️</button>
                    ${deleteBtnHtml}
                    ${plusOneBtn}
                </div>
                <div class="px-5 py-3 ${titleColor}">
                    <span class="px-2 py-1 bg-white text-slate-500 rounded-md text-[10px] font-bold border border-slate-200">
                        👤 ${task.user} ${showProgress ? '🏆 核心目標' : ''}
                    </span>
                </div>
                <div class="px-5 pb-5 border-t border-slate-50">
                    <h3 class="text-[20px] font-black text-slate-800 mb-3 mt-4 pl-3 border-l-2 border-slate-200">
                        ${task.title}
                    </h3>
                    ${progressHtml}
                </div>
            </div>
        `;
        
        container.insertAdjacentHTML('beforeend', cardHtml);

        document.getElementById(`edit-${id}`).addEventListener('click', () => openModal(id, task));
        if (!showProgress) {
            document.getElementById(`del-${id}`).addEventListener('click', () => deleteTask(id));
        } else {
            // 綁定「＋1」按鈕的功能
            document.getElementById(`plus-${id}`).addEventListener('click', () => window.addOne(id, task));
        }
    }
    
    // 3. 輔助工具：根據緊急程度給顏色
    function getPriorityColor(p) {
        if (p === 'high') return '#ff4d4d';
        if (p === 'medium') return '#ffcc00';
        return '#45f045';
    }
    
    // 4. 計算天數 (確保沒壞掉)
    function calculateDays(startDate) {
        const start = new Date(startDate);
        const today = new Date();
        const diffTime = Math.abs(today - start);
        return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    }
    // 監聽集數輸入，自動算趴數
    ['watchedCount', 'totalCount'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => {
            const watched = parseInt(document.getElementById('watchedCount').value) || 0;
            const total = parseInt(document.getElementById('totalCount').value) || 1;
            const percent = Math.round((watched / total) * 100);
            document.getElementById('autoPercent').innerText = percent > 100 ? 100 : percent;
        });
    });

    window.addOne = function(id, task) {
        const newWatched = (task.watched || 0) + 1;
        const total = task.total || 1;
        
        // 防呆：如果已經看完了，就不再加
        if (newWatched > total) return alert("太強了！你已經看完了全集！");

        const newPercent = Math.round((newWatched / total) * 100);

        // 只需要更新改變的部分
        update(ref(db, `tasks/${id}`), {
            watched: newWatched,
            progress: newPercent
        });
    };
</script>
</body>
</html>
