<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>個人進度看板</title>
    <style>
        /* 簡單的開發者風格測試版 */
        body { background-color: #1a1a1a; color: #eee; font-family: monospace; }
        .card { 
            border: 2px solid #444; padding: 10px; margin: 10px; 
            border-radius: 5px; background: #2a2a2a; 
        }
        /* 緊急程度顏色 */
        .priority-high { border-left: 10px solid #ff4d4d; }
        .priority-medium { border-left: 10px solid #ffcc00; }
        .priority-low { border-left: 10px solid #45f045; }
        
        .progress-bar { width: 100%; background: #444; height: 10px; border-radius: 5px; }
        .progress-fill { height: 100%; background: #007bff; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>我的任務看板</h2>
    <div id="task-container"></div>

    <script>
        // 模擬從 GitHub 抓下來的 JSON 資料
        const taskData = [
            { title: "中研院實習申請", priority: "high", start: "2026-03-15", progress: 60 },
            { title: "碩考工程數學複習", priority: "medium", start: "2026-03-01", progress: 30 }
        ];

        function calculateDays(startDate) {
            const start = new Date(startDate);
            const today = new Date();
            const diffTime = Math.abs(today - start);
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        const container = document.getElementById('task-container');
        taskData.forEach(task => {
            const dayCount = calculateDays(task.start);
            container.innerHTML += `
                <div class="card priority-${task.priority}">
                    <h3>${task.title}</h3>
                    <p>已執行：${dayCount} 天</p>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${task.progress}%"></div>
                    </div>
                    <small>進度：${task.progress}%</small>
                </div>
            `;
        });
    </script>
    <div style="background: #333; padding: 20px; margin: 10px; border-radius: 8px;">
    <h3>快速新增任務</h3>
    <input type="text" id="taskTitle" placeholder="要做什麼呢？" style="padding: 5px;">
    
    <select id="taskPriority" style="padding: 5px;">
        <option value="high">緊急 (高)</option>
        <option value="medium">普通 (中)</option>
        <option value="low">不急 (低)</option>
    </select>
    
    <input type="date" id="startDate" style="padding: 5px;">
    
    <button onclick="addNewTask()" style="padding: 5px 15px; cursor: pointer;">新增任務</button>
</div>

<div id="task-container"></div>
</body>
</html>
